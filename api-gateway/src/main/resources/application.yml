server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: library-api
          uri: lb://library-api
          predicates:
            - Path=/api/books/**, /api/loans/**
        - id: catalog-service
          uri: lb://catalog-service
          predicates:
            - Path=/api/reading-lists/**, /api/recommendations/**
    config:
      enabled: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: my-super-secret-key-for-jwt-token-signing-minimum-256-bits
  expiration: 3600000

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true
