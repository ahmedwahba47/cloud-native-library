server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/librarydb
    driver-class-name: org.postgresql.Driver
    username: library
    password: library
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
  jackson:
    date-format: yyyy-MM-dd
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: 1.0
